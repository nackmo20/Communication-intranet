const appState={rawOvp:null,normalizedCourses:[],sofiaRows:[],sofiaGroups:[],associations:[],generatedHtml:"",generatedPages:{},creationPayload:null,updatePayload:null,logs:[],sofiaFileName:"",drupalSofiaMapping:{drupalRows:[],sofiaRows:[],matches:[],validatedMappings:[],drupalFileName:"",sofiaFileName:"",drupalColumns:[],sofiaColumns:[],showAllDrupal:false,showAllSofia:false,manualSearch:"",settings:{reliableThreshold:0.90,probableThreshold:0.75,weakThreshold:0.55}},settings:{weakWords:["formation","module","dispositif","parcours","fil","hda","stage","accompagner","decouvrir","découvrir","renforcer"],onlyIndividualCandidature:true,autoAssociateBest:true,autoAssociateMinScore:0.55,theme:"",selectedPublicIds:[],coursePublicSelections:{},defaultDates:{...DEFAULT_DATES},departmentSelections:{},departmentDuplication:{}}};

function showToast(message){const t=document.getElementById("toast");t.textContent=message;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1800);}
function escapeHtml(text){return String(text||"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m]));}
function removeAccents(text){return (text||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
function normalizeTitle(title){const clean=removeAccents((title||"").toLowerCase()).replace(/[’'\-]/g," ").replace(/[^a-z0-9\s]/g," ");return clean.split(/\s+/).filter(Boolean).filter(w=>!appState.settings.weakWords.includes(w)).join(" ");}
function getWords(text){return new Set(normalizeTitle(text).split(" ").filter(Boolean));}
function slugify(text){return normalizeTitle(text).replace(/\s+/g,"-")||"item";}
function normalizePublicNode(node){return typeof node==="string"?{label:node,children:[]}:({...node,children:(node.children||[]).map(normalizePublicNode)});}
function flattenPublicTree(nodes=PUBLIC_TREE,path=[]){return nodes.map(normalizePublicNode).flatMap(node=>{const next=[...path,node.label];const item={id:slugify(next.join(" ")),label:node.label,path:next.join(" > ")};return [item,...flattenPublicTree(node.children||[],next)];});}
const PUBLIC_INDEX=flattenPublicTree();
function publicsFromIds(ids){const set=new Set(ids||[]);return PUBLIC_INDEX.filter(p=>set.has(p.id));}

function isDepartmentalTagged(course){const txt=normalizeTitle(`${course?.title||""} ${course?.deployment?.level1||""} ${course?.deployment?.level2||""} ${course?.deployment?.level3||""} ${course?.content?.miseEnPlace||""}`);return /departemental|departementalisee|bi departemental|bidepartemental/.test(txt);}
function isBiDepartmentalTagged(course){const txt=normalizeTitle(`${course?.title||""} ${course?.deployment?.level1||""} ${course?.deployment?.level2||""} ${course?.deployment?.level3||""} ${course?.content?.miseEnPlace||""}`);return /bi departemental|bidepartemental/.test(txt);}
function getDepartmentMeta(code){return ACADEMIE_DEPARTMENTS.find(d=>d.code===code)||{code,label:code};}
function getCourseDepartments(course){const selected=appState.settings.departmentSelections?.[course.ovpId]||[];if(selected.length)return selected;const assoc=appState.associations.find(a=>a.ovpId===course.ovpId);const fromModules=[...(new Set((assoc?.sofia?.modules||[]).map(m=>m.territoireCode).filter(Boolean)))];if(fromModules.length)return fromModules;const inferred=inferDepartmentsFromText(`${course.title} ${course.deployment.level1} ${course.deployment.level2} ${course.deployment.level3} ${course.content.miseEnPlace}`).map(d=>d.code);return inferred;}
function getCourseDuplicationMode(course){return appState.settings.departmentDuplication?.[course.ovpId]||"single";}
function getVariantDepartmentCodes(variant){return (variant?.departmentCodes?.length?variant.departmentCodes:(variant?.departmentCode?[variant.departmentCode]:[])).filter(Boolean);}
function getDepartmentTitlePrefix(codes){return codes.filter(Boolean).join("/");}
function buildDrupalTitle(course,variant=null){const base=String(course.title||"").trim();const variantCodes=getVariantDepartmentCodes(variant);if(variantCodes.length)return `${getDepartmentTitlePrefix(variantCodes)} - ${base}`;if(!isDepartmentalTagged(course))return base;const departments=getCourseDepartments(course).filter(Boolean).sort((a,b)=>ACADEMIE_DEPARTMENTS.findIndex(d=>d.code===a)-ACADEMIE_DEPARTMENTS.findIndex(d=>d.code===b));return departments.length?`${getDepartmentTitlePrefix(departments)} - ${base}`:base;}
function getBiDepartmentPairs(codes){const sorted=[...new Set(codes.filter(Boolean))].sort((a,b)=>ACADEMIE_DEPARTMENTS.findIndex(d=>d.code===a)-ACADEMIE_DEPARTMENTS.findIndex(d=>d.code===b));const pairs=[];for(let i=0;i<sorted.length;i+=2)pairs.push(sorted.slice(i,i+2));return pairs.filter(pair=>pair.length);}
function getDrupalExportVariants(){return getEligibleCourses().flatMap(course=>{const mode=getCourseDuplicationMode(course);if(isDepartmentalTagged(course)&&mode!=="single"){const codes=(mode==="all"?ACADEMIE_DEPARTMENTS.map(d=>d.code):getCourseDepartments(course)).filter(Boolean);if(mode==="bi")return getBiDepartmentPairs(codes).map(pair=>({course,departmentCodes:pair,departmentCode:pair.join("/"),departmentLabel:pair.map(code=>getDepartmentMeta(code).label).join(" / "),key:`${course.ovpId}__bidept_${pair.join("_")}`}));return codes.map(code=>({course,departmentCodes:[code],departmentCode:code,departmentLabel:getDepartmentMeta(code).label,key:`${course.ovpId}__dept_${code}`}));}return [{course,departmentCodes:[],departmentCode:"",departmentLabel:"",key:course.ovpId}];});}

function parseFrenchDate(value){const m=String(value||"").match(/^(\d{2})\/(\d{2})\/(\d{4})$/);if(!m)return null;return new Date(Number(m[3]),Number(m[2])-1,Number(m[1]));}

function keywordSimilarity(a,b){const A=getWords(a),B=getWords(b);if(!A.size||!B.size)return 0;let c=0;A.forEach(w=>B.has(w)&&c++);return c/Math.max(A.size,B.size);}
function levenshteinDistance(a,b){a=normalizeTitle(a);b=normalizeTitle(b);const m=a.length,n=b.length;const dp=Array.from({length:m+1},()=>Array(n+1).fill(0));for(let i=0;i<=m;i++)dp[i][0]=i;for(let j=0;j<=n;j++)dp[0][j]=j;for(let i=1;i<=m;i++){for(let j=1;j<=n;j++){dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));}}return dp[m][n];}
function levenshteinSimilarity(a,b){const A=normalizeTitle(a),B=normalizeTitle(b);const max=Math.max(A.length,B.length)||1;return 1-levenshteinDistance(A,B)/max;}
function toNum(v){const n=Number(v);return Number.isFinite(n)?n:0;}

function parseOvpJson(json){if(!json?.plan?.courses||!Array.isArray(json.plan.courses))throw new Error("Structure OVP invalide: plan.courses manquant.");return json;}
function normalizeOvpCourses(rawOvp){return rawOvp.plan.courses.map(c=>({ovpId:c.id||crypto.randomUUID(),title:c.title||"",slug:normalizeTitle(c.title||"").replace(/\s+/g,"-"),hours:{presentiel:toNum(c.presentiel),distanciel:toNum(c.distanciel),total:toNum(c.dureeTotale)},sessions:{presentiel:toNum(c.sessionsPresentiel),distanciel:toNum(c.sessionsDistanciel)},deployment:{level1:c.niveauDeploiement||"",level2:c.niveauDeploiement2||"",level3:c.niveauDeploiement3||""},audience:c.meta?.publicConcerne||"",candidature:c.typeCandidature||"",priority:c.priorite||"",effectif:toNum(c.effectif),status:{toArbitrate:(c.aArbitrer||"").toLowerCase()==="oui",validated:(c.valide||"").toLowerCase()==="oui"},costs:{fraisExceptionnel:toNum(c.fraisExceptionnel),devis:toNum(c.devis),intervenantExterieur:toNum(c.intervenantExterieur)},content:{objectif:c.meta?.objectif||"",contenu:c.meta?.contenu||"",prerequis:c.meta?.prerequis||"",accessibilite:c.meta?.accessibilite||"",datesLieux:c.meta?.datesLieux||"",contact:c.meta?.contact||"",publicConcerne:c.meta?.publicConcerne||"",miseEnPlace:c.meta?.miseEnPlace||""},sofia:{dispositifCode:"",dispositifLabel:"",modules:[]},drupal:{nodeId:"",editUrl:""}}));}
function isIndividualCandidature(course){const v=String(course?.candidature||"").toLowerCase();return v.includes("individ");}

async function handleOvpFolderImport(fileList){const files=[...(fileList||[])].filter(f=>f.name.toLowerCase().endsWith(".json"));if(!files.length){showToast("Aucun JSON détecté dans le dossier.");return;}const merged=[];let planTitle="Import dossier Windows";for(const file of files){try{const raw=parseOvpJson(JSON.parse(await file.text()));if(raw?.plan?.title)planTitle=raw.plan.title;merged.push(...(raw.plan.courses||[]));}catch(e){console.warn("Fichier ignoré",file.name,e.message);}}appState.rawOvp={version:"1.0",savedAt:new Date().toISOString(),plan:{title:planTitle,courses:merged}};appState.normalizedCourses=normalizeOvpCourses(appState.rawOvp);renderAll();showToast(`Dossier importé: ${files.length} fichiers JSON, ${merged.length} parcours.`);}
async function handleOvpFileImport(file){try{const raw=parseOvpJson(JSON.parse(await file.text()));appState.rawOvp=raw;appState.normalizedCourses=normalizeOvpCourses(raw);renderAll();showToast("OVP importé.");}catch(e){showToast("Erreur import OVP: "+e.message);}}

function parseCsv(text){const lines=text.split(/\r?\n/).filter(l=>l.trim()!=="");if(!lines.length)return [];const parseLine=(line)=>{const out=[];let cur="",inQ=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(ch===","&&!inQ){out.push(cur.trim());cur="";}else cur+=ch;}out.push(cur.trim());return out;};return lines.map(parseLine);}
function addColumnMetadata(obj,vals){obj.__cols=vals;obj.__colB=vals[1]||"";obj.__colD=vals[3]||"";return obj;}
function csvRowsToObjects(csvRows){if(!csvRows.length)return [];const first=csvRows[0]||[];const firstLooksLikeHeader=first.some(v=>/identifiant|libell|code|dispositif|module|node|titre|statut|drupal/i.test(String(v||"")));if(firstLooksLikeHeader){const headers=first.map(h=>String(h||"").trim());return csvRows.slice(1).map(vals=>{const obj={};headers.forEach((h,i)=>obj[h]=vals[i]||"");return addColumnMetadata(obj,vals);});}
// fallback: CSV without header -> [Identifiant, Libellé, Code], while preserving physical columns.
return csvRows.map(vals=>addColumnMetadata({Identifiant:vals[0]||"",Libellé:vals[1]||"",Code:vals[2]||""},vals));}

function normalizeSofiaRows(rows){return rows.map(r=>{const dispositifCode=mapValue(r,["Dispositif : code","Identifiant","identifiant","dispositifCode","Code dispositif","code_dispositif","Dispositif","Numéro dispositif"]);const dispositifLabel=mapValue(r,["Dispositif : libellé","Dispositif : libelle","Dispositif de formation.Libellé","Dispositif de formation","Libellé dispositif","Libelle dispositif","dispositifLabel","libelle_dispositif","Libellé","libellé","libelle"]);const moduleCode=mapValue(r,["Module : code","Code","code","moduleCode","Code module","code_module","Numéro module","Module"]);const moduleLabel=mapValue(r,["Module : libellé","Module : libelle","Module.Libellé","Libellé module","Libelle module","moduleLabel","libelle_module","Libellé","libellé","libelle"]);const groupId=mapValue(r,["Groupe : identifiant","Groupe identifiant","groupId"]);const groupLabel=mapValue(r,["Groupe : libellé","Groupe : libelle","Groupe","groupLabel"]);const sessionLabel=mapValue(r,["Session","Session : libellé","Session : libelle","sessionLabel"]);const lieu=mapValue(r,["Lieu","Lieu de formation","Libellé lieu","lieu","location"]);const rne=mapValue(r,["UAI","uai","RNE du lieu","RNE","rne","Code RNE"]);const territory=normalizeTerritory(mapValue(r,["Département","territoireCode","Code département","code_departement"]),mapValue(r,["Territoire","territoireLabel","Département","Libellé département","libelle_departement"]),rne,lieu,dispositifLabel,moduleLabel,groupLabel,sessionLabel);return {

async function handleSofiaFileImport(file){try{let rows=[];if(file.name.toLowerCase().endsWith(".json")){const j=JSON.parse(await file.text());rows=Array.isArray(j)?j:(j.rows||[]);}else{rows=await readTabularFile(file);}appState.sofiaRows=normalizeSofiaRows(rows);appState.sofiaGroups=groupSofiaRowsByDispositif(appState.sofiaRows);appState.sofiaFileName=file.name;renderAll();showToast(`Sofia-FMO importé (${appState.sofiaRows.length} lignes).`);}catch(e){showToast("Erreur import Sofia: "+e.message);}}

function scoreSofiaMatch(ovpCourse,sofiaItem){const modulesText=(sofiaItem.modules||[]).map(m=>m.moduleLabel||"").join(" ");const d=0.45*Math.max(keywordSimilarity(ovpCourse.title,sofiaItem.dispositifLabel),levenshteinSimilarity(ovpCourse.title,sofiaItem.dispositifLabel));const m=0.35*Math.max(keywordSimilarity(ovpCourse.title,modulesText),levenshteinSimilarity(ovpCourse.title,modulesText));const dep=(ovpCourse.deployment.level1&&sofiaItem.deploymentLevel&&ovpCourse.deployment.level1.toLowerCase()===sofiaItem.deploymentLevel.toLowerCase())?0.10:0;const kw=0.10*keywordSimilarity(ovpCourse.content.objectif+" "+ovpCourse.content.contenu,sofiaItem.dispositifLabel+" "+modulesText);let score=d+m+dep+kw;if((ovpCourse.deployment.level1||"").toLowerCase().includes("département")&&(sofiaItem.modules||[]).length>=4)score+=0.05;return Math.min(1,score);}
function findBestMatches(ovpCourse,sofiaGroups,limit=3){return sofiaGroups.map(group=>({group,score:scoreSofiaMatch(ovpCourse,group)})).sort((a,b)=>b.score-a.score).slice(0,limit);}

function formatTextBlock(text){const lines=String(text||"").split(/\r?\n/);let html="";let list=[];const flush=()=>{if(list.length){html+=`<ul>${list.map(x=>`<li>${escapeHtml(x)}</li>`).join("")}</ul>`;list=[];}};for(const line of lines){if(line.trim().startsWith("- "))list.push(line.trim().slice(2));else{flush();html+=`${escapeHtml(line)}<br>`;}}flush();return html;}
function formatSectionBody(text,fallback=""){const value=String(text||fallback||"").trim();if(!value)return "";const lines=value.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);if(lines.some(l=>l.startsWith("- ")))return formatTextBlock(value);return `<p>${lines.map(escapeHtml).join("<br>")}</p>`;}

function runQualityChecks(){const out=[];const dates=getDefaultDates();const startDate=parseFrenchDate(dates.preinscriptionStartDate);const unpublishDate=parseFrenchDate(dates.unpublishDate);if(!appState.settings.theme)out.push({level:"erreur",course:"Global",message:"Thématique non sélectionnée",action:"Sélectionner une thématique avant export"});if(!getSelectedPublics().length)out.push({level:"erreur",course:"Global",message:"Aucun public sélectionné",action:"Cocher au moins un public"});if(!dates.preinscriptionStartDate)out.push({level:"erreur",course:"Global",message:"Date de début de préinscription absente",action:"Renseigner la date"});if(!dates.unpublishDate)out.push({level:"erreur",course:"Global",message:"Date de dépublication absente",action:"Renseigner la date"});if(startDate&&unpublishDate&&unpublishDate<startDate)out.push({level:"erreur",course:"Global",message:"Date de dépublication antérieure à la date de début de préinscription",action:"Corriger les dates"});for(const c of appState.normalizedCourses){const a=appState.associations.find(x=>x.ovpId===c.ovpId);if(!a?.sofia?.dispositifCode)out.push({level:"erreur",course:c.title,message:"Parcours sans dispositif",action:"Associer un dispositif"});if(!(a?.sofia?.modules||[]).length)out.push({level:"erreur",course:c.title,message:"Parcours sans module",action:"Ajouter un module"});for(const m of (a?.sofia?.modules||[])){if(!validateModuleCode(m.moduleCode))out.push({level:"erreur",course:c.title,message:"Module sans code",action:"Renseigner moduleCode (mapping externe uniquement)"});if((c.deployment.level1||"").toLowerCase().includes("département")&&!m.territoireCode)out.push({level:"alerte",course:c.title,message:"Module sans territoire",action:"Renseigner territoire"});if((m.preinscription?.status||"").toLowerCase().includes("ouvert")&&!m.preinscription?.link)out.push({level:"alerte",course:c.title,message:"Préinscription ouverte sans lien",action:"Ajouter lien"});}
if(c.hours.presentiel+c.hours.distanciel!==c.hours.total)out.push({level:"alerte",course:c.title,message:"Incohérence durée",action:"Vérifier heures"});
if(!getChapoText(c))out.push({level:"alerte",course:c.title,message:"Contenu vide",action:"Compléter course.meta.contenu"});
if(!getContactText(c))out.push({level:"alerte",course:c.title,message:"Contact vide",action:"Compléter course.meta.contact"});
if(isDefaultAccessibilityUsed(c))out.push({level:"info",course:c.title,message:"Accessibilité remplacée par la phrase par défaut",action:"Vérifier si une mention spécifique est nécessaire"});
const depts=getCourseDepartments(c);const duplicationMode=getCourseDuplicationMode(c);if(isDepartmentalTagged(c)&&!depts.length)out.push({level:"erreur",course:c.title,message:"Titre départementalisé sans département sélectionné",action:"Sélectionner le ou les départements concernés"});if(isBiDepartmentalTagged(c)&&depts.length!==2)out.push({level:"erreur",course:c.title,message:"Formation bi-départementale avec moins ou plus de deux départements",action:"Sélectionner exactement deux départements"});if(duplicationMode==="bi"&&(depts.length<2||depts.length%2!==0))out.push({level:"erreur",course:c.title,message:"Duplication bidépartementale incomplète",action:"Sélectionner les départements par groupes de deux"});
if((c.deployment.level1||"").toLowerCase().includes("département")&&(a?.sofia?.modules||[]).length&&!detectDepartmentalModules(a.sofia.modules))out.push({level:"info",course:c.title,message:"4 départements non complets",action:"Ajouter 16/17/79/86 si nécessaire"});
if(a?.sofia?.dispositifCode&&!validateDispositifCode(a.sofia.dispositifCode))out.push({level:"erreur",course:c.title,message:"Code dispositif invalide",action:"Corriger code dans le mapping externe"});
}
checkDuplicateAssociations().forEach(k=>out.push({level:"erreur",course:"Global",message:`Doublon ${k}`,action:"Supprimer doublon"}));
const map=appState.drupalSofiaMapping;if(map?.drupalRows?.length){const byDrupal=new Map(),bySofia=new Map();map.validatedMappings.forEach(v=>{byDrupal.set(v.drupalParcoursId,(byDrupal.get(v.drupalParcoursId)||0)+1);const key=`${v.sofia?.dispositifCode||""}|${v.sofia?.moduleCode||""}`;bySofia.set(key,(bySofia.get(key)||0)+1);if(!v.sofia?.dispositifCode)out.push({level:"erreur",course:v.drupalTitle,message:"Code dispositif Sofia-FMO vide",action:"Compléter le mapping externe"});if(!v.sofia?.moduleCode)out.push({level:"erreur",course:v.drupalTitle,message:"Code module Sofia-FMO vide",action:"Compléter le mapping externe"});if((v.match?.score||0)<map.settings.probableThreshold)out.push({level:"alerte",course:v.drupalTitle,message:"Association Drupal ↔ Sofia avec score faible",action:"Vérifier manuellement"});});map.drupalRows.forEach(r=>{if(!r.drupalTitle)out.push({level:"erreur",course:r.drupalParcoursId,message:"Titre Drupal vide",action:"Corriger le tableau Drupal"});if(!map.validatedMappings.some(v=>v.drupalParcoursId===r.drupalParcoursId))out.push({level:"alerte",course:r.drupalTitle||r.drupalParcoursId,message:"Parcours Drupal sans association Sofia-FMO",action:"Valider une association"});});map.sofiaRows.forEach(r=>{if(!r.combinedTitle)out.push({level:"alerte",course:r.dispositifCode||r.moduleCode,message:"Titre Sofia-FMO vide",action:"Corriger le tableau Sofia"});});byDrupal.forEach((count,id)=>{const mode=map.drupalRows.find(r=>r.drupalParcoursId===id)?.mappingMode||"single";if(count>1&&mode==="single")out.push({level:"erreur",course:id,message:"Même parcours Drupal associé à plusieurs modules Sofia-FMO",action:"Passer en multi_module ou departmental"});});bySofia.forEach((count,key)=>{if(key!=="|"&&count>1)out.push({level:"alerte",course:"Mapping Drupal ↔ Sofia-FMO",message:`Même couple dispositif/module associé à plusieurs parcours Drupal (${key})`,action:"Vérifier les doublons"});});getSofiaGroupPreinscriptionAlerts(map.sofiaRows).forEach(a=>out.push({level:a.level,course:"Mapping Drupal ↔ Sofia-FMO",message:a.message,action:"Vérifier les colonnes Lieu et UAI ; passer le mapping en departmental si confirmé"}));getSofiaLocationGroupCoverageAlerts(map.sofiaRows,map.validatedMappings).forEach(a=>out.push({level:a.level,course:"Mapping BI-RANA",message:a.message,action:"Ajouter/valider les ID Drupal manquants ou corriger les lieux Sofia-FMO"}));getSofiaLocationGroupCoverageAlerts(appState.sofiaRows,map.validatedMappings).forEach(a=>out.push({level:a.level,course:"Plan et sessions Sofia-FMO",message:a.message,action:"Ajouter/valider autant d’ID Drupal que de groupes/lieux Sofia-FMO"}));getMappingExportBlockers().forEach(message=>out.push({level:"erreur",course:"Export mapping",message,action:"Importer Plan et sessions et vérifier les départements dans les titres Drupal"}));}getSofiaGroupPreinscriptionAlerts(appState.sofiaRows).forEach(a=>out.push({level:a.level,course:"Import Sofia-FMO",message:a.message,action:"Vérifier les colonnes Lieu et UAI ; traiter comme formation départementale au niveau des groupes"}));

function getMappingsToReview(){const m=appState.drupalSofiaMapping;const validated=new Set(m.validatedMappings.map(x=>x.drupalParcoursId));const low=m.matches.filter(x=>(x.proposals[0]?.score||0)<m.settings.probableThreshold).map(x=>{const d=m.drupalRows.find(r=>r.drupalParcoursId===x.drupalParcoursId)||{};const p=x.proposals[0]?.sofia||{};return {drupalParcoursId:d.drupalParcoursId,drupalNodeId:d.drupalNodeId,drupalTitle:d.drupalTitle,territoireCode:p.territoireCode||"",sofia:{dispositifCode:p.dispositifCode||"",dispositifLabel:p.dispositifLabel||"",moduleCode:p.moduleCode||"",moduleLabel:p.moduleLabel||""},match:{score:x.proposals[0]?.score||0,status:"review",method:"automatic"}};});const missing=m.drupalRows.filter(r=>!validated.has(r.drupalParcoursId)).map(r=>({drupalParcoursId:r.drupalParcoursId,drupalNodeId:r.drupalNodeId,drupalTitle:r.drupalTitle,territoireCode:"",sofia:{},match:{score:0,status:"missing",method:""}}));return [...low,...missing];}
function renderDrupalSofiaMapping(){const t=document.getElementById("tab-drupal-sofia");const m=appState.drupalSofiaMapping;const locationSourceRows=appState.sofiaRows.length?appState.sofiaRows:m.sofiaRows;const preinscriptionAlerts=[...getSofiaGroupPreinscriptionAlerts(locationSourceRows),...getSofiaLocationGroupCoverageAlerts(locationSourceRows,m.validatedMappings),...getMappingExportBlockers().map(message=>({level:"alerte",message}))];const alertHtml=preinscriptionAlerts.length?`<div class="card"><h3>Alertes lieux Sofia-FMO / mapping</h3><p><strong>Source lieux :</strong> ${appState.sofiaRows.length?"Plan et sessions Sofia-FMO":"fichier BI-RANA importé dans le mapping"}</p>${preinscriptionAlerts.map(a=>`<p><span class="badge ${a.level==="alerte"?"badge-warning":"badge-info"}">${a.level}</span> ${escapeHtml(a.message)}</p>`).join("")}</div>`:"";const drupalRows=(m.showAllDrupal?m.drupalRows:m.drupalRows.slice(0,20)).map(r=>`<tr><td>${escapeHtml(r.drupalParcoursId)}</td><td>${escapeHtml(r.drupalTitle)}</td></tr>`).join("");const sofiaRows=(m.showAllSofia?m.sofiaRows:m.sofiaRows.slice(0,20)).map(r=>`<tr><td>${escapeHtml(r.dispositifCode)}</td><td>${escapeHtml(r.dispositifLabel)}</td><td>${escapeHtml(r.moduleCode)}</td><td>${escapeHtml(r.moduleLabel)}</td><td>${escapeHtml(r.lieu||"")}</td><td>${escapeHtml(r.rne||"")}</td><td>${escapeHtml(r.territoireCode||"")}</td></tr>`).join("");const matchRows=m.drupalRows.map((d,idx)=>{const match=m.matches.find(x=>x.drupalParcoursId===d.drupalParcoursId);const proposals=match?.proposals||[];const first=proposals[0];const val=m.validatedMappings.find(x=>x.drupalParcoursId===d.drupalParcoursId);const selected=first?.sofia||{};const enrichedVal=val?enrichMappingWithPlanSession(val):null;const planInfo=enrichedVal?(enrichedVal.planSessions||[]).map(ps=>`${ps.territoireCode||ps.departmentFromRne||""} — ${ps.rne||"RNE ?"} — ${ps.lieu||ps.groupLabel||ps.sessionLabel||""}`.trim()).filter(Boolean).join("<br>"):"";const opts=proposals.map((p,i)=>`<option value="${i}">${Math.round(p.score*100)}% - ${escapeHtml(p.sofia.dispositifCode)} / ${escapeHtml(p.sofia.moduleCode)} - ${escapeHtml(p.sofia.combinedTitle)}</option>`).join("");return `<tr><td><input type="radio" name="activeDrupal" value="${escapeHtml(d.drupalParcoursId)}" ${idx===0?"checked":""}></td><td>${escapeHtml(d.drupalParcoursId)}<br><select data-map-mode="${escapeHtml(d.drupalParcoursId)}"><option value="single" ${d.mappingMode==="single"?"selected":""}>single</option><option value="multi_module" ${d.mappingMode==="multi_module"?"selected":""}>multi_module</option><option value="departmental" ${d.mappingMode==="departmental"?"selected":""}>departmental</option></select></td><td>${escapeHtml(d.drupalTitle)}</td><td>${escapeHtml((val?.sofia||selected).dispositifLabel||"")}</td><td>${escapeHtml((val?.sofia||selected).dispositifCode||"")}</td><td>${escapeHtml((val?.sofia||selected).moduleLabel||"")}</td><td>${escapeHtml((val?.sofia||selected).moduleCode||"")}</td><td>${first?Math.round(first.score*100)+"%":"-"}</td><td>${val?"Validé":(first?.status||"Non trouvé")}</td><td>${planInfo||"<span class='badge badge-warning'>Non associé</span>"}</td><td><select data-proposal="${escapeHtml(d.drupalParcoursId)}">${opts}</select><div class="actions"><button data-validate-map="${escapeHtml(d.drupalParcoursId)}">Valider</button><button data-refuse-map="${escapeHtml(d.drupalParcoursId)}">Refuser</button><button data-show-top="${escapeHtml(d.drupalParcoursId)}">Voir les 5</button></div></td></tr>`;}).join("");t.innerHTML=`<div class="grid grid-2"><div class="card"><h3>Import tableau Drupal</h3><input type="file" id="mapDrupalFile" accept=".csv,.xls,.xlsx,.xslsx,.xlsm,.html,.txt" multiple><p>Vous pouvez sélectionner plusieurs fichiers Drupal. Lignes: ${m.drupalRows.length} — Colonnes: ${escapeHtml((m.drupalColumns||[]).join(", "))}</p><button>Configurer les colonnes</button></div><div class="card"><h3>Import BI-RANA dispositifs/modules</h3><div class="actions"><input type="file" id="mapSofiaFile" accept=".csv,.xls,.xlsx,.xslsx,.xlsm,.html,.txt"><button id="downloadMapSofiaTemplate">Télécharger modèle BI-RANA</button></div><p>Pour le matching, importez ici l’excel BI-RANA contenant les numéros de dispositif, numéros de module, titres des dispositifs et titres des modules. Les lieux viennent de l’onglet Import Sofia-FMO / Plan et sessions.</p><p>Lignes: ${m.sofiaRows.length} — Colonnes: ${escapeHtml((m.sofiaColumns||[]).join(", "))}</p><button>Configurer les colonnes</button></div></div>${alertHtml}<div class="grid grid-2"><div class="card"><h3>Aperçu Drupal</h3><table class="table"><thead><tr><th>ID parcours Drupal</th><th>Titre Drupal</th></tr></thead><tbody>${drupalRows||"<tr><td colspan='2'>Aucune donnée</td></tr>"}</tbody></table><button id="toggleDrupalPreview">voir plus</button></div><div class="card"><h3>Aperçu Sofia-FMO</h3><table class="table"><thead><tr><th>Code dispositif</th><th>Libellé dispositif</th><th>Code module</th><th>Libellé module</th><th>Lieu</th><th>RNE du lieu</th><th>Territoire</th></tr></thead><tbody>${sofiaRows||"<tr><td colspan='7'>Aucune donnée</td></tr>"}</tbody></table><button id="toggleSofiaPreview">voir plus</button></div></div><div class="card"><h3>Association automatique</h3><button class="primary" id="runDrupalSofiaMatch">Lancer l'association automatique</button><div class="field-row"><label>Rechercher un dispositif ou module Sofia-FMO</label><input id="manualSofiaSearch" value="${escapeHtml(m.manualSearch||"")}" placeholder="code, libellé dispositif ou module"></div><div id="manualSofiaResults"></div></div><div class="card"><h3>Tableau de validation</h3><table class="table"><thead><tr><th>Sélection</th><th>ID parcours Drupal</th><th>Titre Drupal</th><th>Proposition dispositif</th><th>Code dispositif</th><th>Proposition module</th><th>Code module</th><th>Score</th><th>Statut</th><th>Plan/session associé</th><th>Action</th></tr></thead><tbody>${matchRows||"<tr><td colspan='11'>Lancez l'association automatique</td></tr>"}</tbody></table></div><div class="card"><h3>Exports mapping externe</h3><div class="actions"><button id="saveMappingBtn">Sauvegarder le mapping</button><button id="restoreMappingBtn">Restaurer le mapping</button><button id="resetMappingBtn">Réinitialiser le mapping</button><button id="exportMapJson">Export JSON</button><button id="exportMapCsv">Export CSV</button><button id="exportMapXlsx">Export Excel</button><button id="exportReviewCsv">Export à vérifier CSV</button></div></div>`;bindDrupalSofiaMappingEvents();}
function bindDrupalSofiaMappingEvents(){const m=appState.drupalSofiaMapping;document.getElementById("mapDrupalFile")?.addEventListener("change",e=>e.target.files.length&&handleDrupalMappingFiles(e.target.files,"drupal"));document.getElementById("mapSofiaFile")?.addEventListener("change",e=>e.target.files[0]&&handleDrupalMappingFile(e.target.files[0],"sofia"));document.getElementById("downloadMapSofiaTemplate")?.addEventListener("click",downloadBiRanaMappingTemplate);document.getElementById("toggleDrupalPreview")?.addEventListener("click",()=>{m.showAllDrupal=!m.showAllDrupal;renderAll();});document.getElementById("toggleSofiaPreview")?.addEventListener("click",()=>{m.showAllSofia=!m.showAllSofia;renderAll();});document.getElementById("runDrupalSofiaMatch")?.addEventListener("click",runDrupalSofiaAutoMatch);document.querySelectorAll("select[data-map-mode]").forEach(sel=>sel.onchange=e=>{const r=m.drupalRows.find(x=>x.drupalParcoursId===sel.dataset.mapMode);if(r)r.mappingMode=e.target.value;persistDrupalSofiaMapping();renderAll();});document.querySelectorAll("button[data-validate-map]").forEach(btn=>btn.onclick=()=>{const match=m.matches.find(x=>x.drupalParcoursId===btn.dataset.validateMap);const sel=document.querySelector(`select[data-proposal="${CSS.escape(btn.dataset.validateMap)}"]`);const p=match?.proposals[Number(sel?.value||0)];if(p)validateDrupalSofiaMapping(btn.dataset.validateMap,p.sofia,p.score,"automatic");});document.querySelectorAll("button[data-refuse-map]").forEach(btn=>btn.onclick=()=>refuseDrupalSofiaMapping(btn.dataset.refuseMap));document.querySelectorAll("button[data-show-top]").forEach(btn=>btn.onclick=()=>{const match=m.matches.find(x=>x.drupalParcoursId===btn.dataset.showTop);alert((match?.proposals||[]).map((p,i)=>`${i+1}. ${Math.round(p.score*100)}% — ${p.sofia.dispositifCode}/${p.sofia.moduleCode} — ${p.sofia.combinedTitle}`).join("\n")||"Aucune proposition");});const search=document.getElementById("manualSofiaSearch");if(search)search.oninput=e=>{m.manualSearch=e.target.value;renderManualSofiaResults();};renderManualSofiaResults();document.getElementById("saveMappingBtn")?.addEventListener("click",()=>{persistDrupalSofiaMapping();showToast("Mapping sauvegardé.");});document.getElementById("restoreMappingBtn")?.addEventListener("click",restoreDrupalSofiaMapping);document.getElementById("resetMappingBtn")?.addEventListener("click",resetDrupalSofiaMapping);document.getElementById("exportMapJson")?.addEventListener("click",downloadMappingJson);document.getElementById("exportMapCsv")?.addEventListener("click",()=>downloadMappingCsv());document.getElementById("exportMapXlsx")?.addEventListener("click",()=>downloadMappingExcel());document.getElementById("exportReviewCsv")?.addEventListener("click",()=>downloadMappingCsv(getMappingsToReview(),"mapping-a-verifier.csv"));}
function renderManualSofiaResults(){const box=document.getElementById("manualSofiaResults");if(!box)return;const m=appState.drupalSofiaMapping;const q=normalizeTitle(m.manualSearch||"");if(!q){box.innerHTML="";return;}const rows=m.sofiaRows.filter(r=>normalizeTitle(`${r.dispositifCode} ${r.dispositifLabel} ${r.moduleCode} ${r.moduleLabel}`).includes(q)).slice(0,10);box.innerHTML=`<table class="table"><tbody>${rows.map((r,i)=>`<tr><td>${escapeHtml(r.dispositifCode)}</td><td>${escapeHtml(r.dispositifLabel)}</td><td>${escapeHtml(r.moduleCode)}</td><td>${escapeHtml(r.moduleLabel)}</td><td><button data-manual-sofia="${i}">Associer à la sélection</button></td></tr>`).join("")}</tbody></table>`;box.querySelectorAll("button[data-manual-sofia]").forEach(btn=>btn.onclick=()=>{const active=document.querySelector("input[name='activeDrupal']:checked")?.value;if(!active)return showToast("Sélectionnez un parcours Drupal.");validateDrupalSofiaMapping(active,rows[Number(btn.dataset.manualSofia)],0,"manual");});}
function renderQualityChecks(){const data=runQualityChecks();const rows=data.map(r=>`<tr><td><span class="badge ${r.level==="erreur"?"badge-error":r.level==="alerte"?"badge-warning":r.level==="ok"?"badge-success":"badge-info"}">${escapeHtml(r.level)}</span></td><td>${escapeHtml(r.course)}</td><td>${escapeHtml(r.message)}</td><td>${escapeHtml(r.action)}</td></tr>`).join("");document.getElementById("tab-checks").innerHTML=`<div class="card"><table class="table"><thead><tr><th>Niveau</th><th>Parcours</th><th>Message</th><th>Action conseillée</th></tr></thead><tbody>${rows||"<tr><td colspan='4'>Aucun contrôle.</td></tr>"}</tbody></table></div>`;}
function renderAll(){autoAssociateAllCourses();renderOvpCourses();renderSofiaRows();renderAutoAssociations();renderManualAssociations();renderDrupalPreview();renderExports();renderDrupalSofiaMapping();renderQualityChecks();}

document.getElementById("saveStateBtn").onclick=saveState;document.getElementById("restoreStateBtn").onclick=restoreState;document.getElementById("resetStateBtn").onclick=resetState;
renderTabs();renderAll();
</script>
